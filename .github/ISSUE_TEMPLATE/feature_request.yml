name: Feature Request
description: 提议一个新功能
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        感谢你提出新功能建议！

  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 请清晰描述这个功能的使用场景
      placeholder: 作为用户，我希望能够...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 描述你希望如何实现这个功能
      placeholder: 我希望添加一个...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      description: 你考虑过其他解决方案吗？

  - type: dropdown
    id: type
    attributes:
      label: 功能类型
      options:
        - 新主题
        - UI/UX 改进
        - 编辑器功能
        - 导出功能
        - 性能优化
        - 其他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 额外信息
      description: 截图、原型或其他参考资料
